<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — Rappi Lima</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body class="auth-page">

    <div class="auth-bg"></div>

    <div class="auth-card">
        <!-- Header -->
        <div class="auth-header">
            <span class="logo">🛵</span>
            <h1>Bienvenido a Rappi</h1>
            <p>Ingresa para pedir tu comida favorita</p>
        </div>

        <!-- Body -->
        <div class="auth-body">

            <!-- Alerta de error -->
            <div class="auth-alert" id="login-alert"></div>

            <!-- Formulario -->
            <form id="login-form" autocomplete="off">

                <div class="form-group">
                    <label>Correo electrónico</label>
                    <div class="input-wrap">
                        <span class="input-icon">📧</span>
                        <input id="inp-email" type="email" placeholder="tu@correo.com" autocomplete="email">
                    </div>
                    <div class="field-error"></div>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="toggle-pass" id="toggle-pass" title="Mostrar/ocultar">👁</button>
                    </div>
                    <div class="field-error"></div>
                </div>

                <button type="submit" class="btn-primary" id="btn-submit">Ingresar →</button>

            </form>

            <!-- Divisor -->
            <div class="divider">o</div>

            <!-- Credenciales demo -->
            <div
                style="background:#181D2A; border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px; margin-bottom:16px; font-size:12px; color:#8A91A8;">
                <div style="font-weight:600; color:#E8EBF4; margin-bottom:8px;">🔑 Credenciales de prueba</div>
                <div>Admin: <span style="color:#FF6B2C; font-family:var(--mono)">admin@rappi.pe</span> / <span
                        style="font-family:var(--mono)">admin123</span></div>
                <div style="margin-top:4px">Usuario: regístrate en la página de registro</div>
            </div>

            <!-- Enlace a registro -->
            <div class="auth-switch">
                ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="../assets/js/auth/session.js"></script>
    <script src="../assets/js/auth/login.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — Rappi Lima</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/forms.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body class="auth-page">

    <div class="auth-bg"></div>

    <div class="auth-card">
        <div class="auth-header">
            <span class="logo">🛵</span>
            <h1>Bienvenido a Rappi</h1>
            <p>Ingresa para pedir tu comida favorita</p>
        </div>

        <div class="auth-body">

            <div class="auth-alert" id="login-alert"></div>

            <form id="login-form" autocomplete="off">

                <div class="form-group">
                    <label>Correo electrónico</label>
                    <div class="input-wrap">
                        <span class="input-icon">📧</span>
                        <input id="inp-email" type="email" placeholder="tu@correo.com" autocomplete="email">
                    </div>
                    <div class="field-error"></div>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="toggle-pass" id="toggle-pass" title="Mostrar/ocultar">👁</button>
                    </div>
                    <div class="field-error"></div>
                </div>

                <button type="submit" class="btn-primary" id="btn-submit">Ingresar →</button>

            </form>

            <div class="divider">o</div>

            <div class="demo-box">
                <div class="demo-title">🔑 Credenciales de prueba</div>
                <div>Admin: <span class="demo-val">admin@rappi.pe</span> / <span class="demo-val">admin123</span></div>
                <div style="margin-top:4px">Usuario: regístrate en la página de registro</div>
            </div>

            <div class="auth-switch">
                ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
            </div>

        </div>
    </div>

    <div id="toast"></div>

    <script src="../assets/js/auth/session.js"></script>
    <script src="../assets/js/auth/login.js"></script>
</body>

</html>

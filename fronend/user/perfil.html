<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil — Rappi Lima</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/user.css">
    <style>
        .page-wrap {
            max-width: 780px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        /* Avatar */
        .avatar-block {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: var(--r2);
            padding: 24px;
        }

        .avatar-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orange), #FF3E5E);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            flex-shrink: 0;
        }

        .avatar-info h2 {
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
        }

        .avatar-info p {
            font-size: 13px;
            color: var(--text2);
            margin-top: 4px;
        }

        .avatar-info .rol {
            display: inline-block;
            background: var(--orange-light);
            border: 1px solid var(--orange-border);
            color: var(--orange);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 6px;
        }

        /* Panel de secciones */
        .profile-panel {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: var(--r2);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .profile-panel-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-panel-body {
            padding: 20px;
        }

        /* Campos de formulario */
        .field-group {
            margin-bottom: 16px;
        }

        .field-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 6px;
        }

        .field-group input,
        .field-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color .15s;
        }

        .field-group input:focus,
        .field-group select:focus {
            border-color: var(--orange);
        }

        .field-group input[readonly] {
            color: var(--text2);
            cursor: not-allowed;
        }

        /* Grid 2 col */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        /* Botones */
        .btn-save {
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: var(--r);
            padding: 11px 24px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-save:hover {
            background: var(--orange2);
        }

        .btn-outline {
            background: none;
            color: var(--text2);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            padding: 10px 20px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color .15s;
        }

        .btn-outline:hover {
            border-color: var(--orange);
            color: var(--orange);
        }

        .btn-danger {
            background: none;
            color: #DC2626;
            border: 1.5px solid #FECACA;
            border-radius: var(--r);
            padding: 10px 20px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-danger:hover {
            background: #FEF2F2;
        }

        /* Alert */
        .alert-success {
            background: var(--green-light);
            border: 1.5px solid var(--green);
            color: var(--green);
            border-radius: var(--r);
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
        }

        .alert-success.show {
            display: block;
        }

        /* Stats de usuario */
        .user-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-box {
            background: var(--bg3);
            border-radius: var(--r);
            padding: 14px;
            text-align: center;
        }

        .stat-box .val {
            font-size: 22px;
            font-weight: 900;
            color: var(--orange);
            font-family: var(--mono);
        }

        .stat-box .lbl {
            font-size: 11px;
            color: var(--text2);
            margin-top: 4px;
        }

        /* Contraseña: barras de fuerza */
        .pw-bars {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .pw-bar {
            flex: 1;
            height: 3px;
            border-radius: 10px;
            background: var(--border);
            transition: background .3s;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="user-nav">
        <div class="nav-logo" onclick="window.location.href='home.html'">
            <div class="nav-logo-icon">🛵</div>
            <div class="nav-logo-text"><span>Rappi</span> Lima</div>
        </div>
        <div class="nav-right">
            <button class="nav-btn" onclick="window.location.href='home.html'">← Inicio</button>
            <button class="nav-btn" onclick="window.location.href='pedidos.html'">Mis pedidos</button>
            <button class="nav-btn" onclick="logout()"
                style="border-color:transparent;color:var(--text3)">Salir</button>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="page-wrap">

        <!-- Avatar / cabecera -->
        <div class="avatar-block">
            <div class="avatar-circle" id="avatar-initials">AD</div>
            <div class="avatar-info">
                <h2 id="avatar-name">Cargando...</h2>
                <p id="avatar-email">—</p>
                <span class="rol" id="avatar-rol">Usuario</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="profile-panel" style="margin-bottom:20px;">
            <div class="profile-panel-header">📊 Resumen de actividad</div>
            <div class="profile-panel-body">
                <div class="user-stats">
                    <div class="stat-box">
                        <div class="val" id="stat-total">—</div>
                        <div class="lbl">Pedidos totales</div>
                    </div>
                    <div class="stat-box">
                        <div class="val" id="stat-entregados">—</div>
                        <div class="lbl">Entregados</div>
                    </div>
                    <div class="stat-box">
                        <div class="val" id="stat-gasto">—</div>
                        <div class="lbl">Gasto total</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alerta de éxito global -->
        <div class="alert-success" id="alert-ok">✅ Cambios guardados correctamente.</div>

        <!-- Información personal -->
        <div class="profile-panel">
            <div class="profile-panel-header">
                👤 Información personal
            </div>
            <div class="profile-panel-body">
                <div class="grid-2">
                    <div class="field-group">
                        <label>Nombre completo</label>
                        <input type="text" id="inp-nombre" placeholder="Tu nombre">
                    </div>
                    <div class="field-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="inp-email" readonly>
                    </div>
                    <div class="field-group">
                        <label>Teléfono</label>
                        <input type="tel" id="inp-telefono" placeholder="+51 999 000 000">
                    </div>
                    <div class="field-group">
                        <label>Distrito</label>
                        <select id="inp-distrito">
                            <option>Miraflores</option>
                            <option>San Isidro</option>
                            <option>Barranco</option>
                            <option>Surco</option>
                            <option>San Borja</option>
                            <option>La Molina</option>
                            <option>Chorrillos</option>
                            <option>Lince</option>
                            <option>San Miguel</option>
                            <option>Callao</option>
                            <option>Otro</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex;gap:10px;margin-top:4px;">
                    <button class="btn-save" onclick="guardarDatos()">💾 Guardar cambios</button>
                    <button class="btn-outline" onclick="cancelarEdicion()">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Cambiar contraseña -->
        <div class="profile-panel">
            <div class="profile-panel-header">🔒 Cambiar contraseña</div>
            <div class="profile-panel-body">
                <div class="field-group">
                    <label>Contraseña actual</label>
                    <input type="password" id="inp-pass-actual" placeholder="••••••••">
                </div>
                <div class="grid-2">
                    <div class="field-group">
                        <label>Nueva contraseña</label>
                        <input type="password" id="inp-pass-nueva" placeholder="Mínimo 6 caracteres"
                            oninput="updatePwBars(this.value)">
                        <div class="pw-bars">
                            <div class="pw-bar" id="pb1"></div>
                            <div class="pw-bar" id="pb2"></div>
                            <div class="pw-bar" id="pb3"></div>
                            <div class="pw-bar" id="pb4"></div>
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Confirmar nueva contraseña</label>
                        <input type="password" id="inp-pass-confirm" placeholder="Repite la contraseña">
                    </div>
                </div>
                <div id="pass-error" style="font-size:12px;color:#DC2626;margin-bottom:10px;display:none;"></div>
                <button class="btn-save" onclick="cambiarPassword()">🔑 Actualizar contraseña</button>
            </div>
        </div>

        <!-- Zona de peligro -->
        <div class="profile-panel" style="border-color:#FECACA;">
            <div class="profile-panel-header" style="color:#DC2626;">⚠ Zona de peligro</div>
            <div class="profile-panel-body">
                <p style="font-size:13px;color:var(--text2);margin-bottom:14px;">
                    Cerrar sesión te redirigirá al login. Tus datos se conservarán.
                </p>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn-outline" onclick="logout()">🚪 Cerrar sesión</button>
                </div>
            </div>
        </div>

    </div><!-- /page-wrap -->

    <div id="toast"></div>

    <script src="../assets/js/auth/session.js"></script>
    <script src="../assets/js/user/perfil.js"></script>
</body>

</html>

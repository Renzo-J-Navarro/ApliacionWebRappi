<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis pedidos — Rappi Lima</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/user.css">
    <style>
        .page-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        .pedido-card {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: var(--r2);
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color .2s;
        }

        .pedido-card:hover {
            border-color: var(--orange-border);
        }

        .pedido-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .pedido-id {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--orange);
        }

        .pedido-fecha {
            font-size: 12px;
            color: var(--text3);
            margin-top: 2px;
        }

        .pedido-rest {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .estado-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .estado-entregado {
            background: var(--green-light);
            color: var(--green);
        }

        .estado-en_camino {
            background: #FFFBEB;
            color: var(--yellow);
        }

        .estado-cancelado {
            background: #FEF2F2;
            color: #DC2626;
        }

        .pedido-body {
            padding: 14px 18px;
            display: none;
        }

        .pedido-body.open {
            display: block;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-name {
            color: var(--text);
            font-weight: 600;
        }

        .item-price {
            color: var(--text2);
            font-family: var(--mono);
        }

        .pedido-totals {
            margin-top: 12px;
            background: var(--bg3);
            border-radius: var(--r);
            padding: 12px 14px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .total-row.bold {
            font-weight: 800;
            color: var(--text);
            font-size: 15px;
            margin-top: 6px;
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }

        .algo-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--orange-light);
            border: 1px solid var(--orange-border);
            color: var(--orange);
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text3);
        }

        .empty-state .icon {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="user-nav">
        <div class="nav-logo" onclick="window.location.href='home.html'">
            <div class="nav-logo-icon">🛵</div>
            <div class="nav-logo-text"><span>Rappi</span> Lima</div>
        </div>
        <div class="nav-right">
            <span id="user-greeting" style="font-size:13px;color:var(--text2);font-weight:600;"></span>
            <button class="nav-btn" onclick="window.location.href='home.html'">← Volver al inicio</button>
            <button class="nav-btn" onclick="window.location.href='perfil.html'">Mi perfil</button>
            <button class="nav-btn" onclick="logout()"
                style="border-color:transparent;color:var(--text3)">Salir</button>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="page-wrap">

        <div style="margin-bottom:24px;">
            <h1 style="font-size:22px;font-weight:900;color:var(--text);">📦 Mis pedidos</h1>
            <p style="font-size:14px;color:var(--text2);margin-top:4px;">Historial completo de tus pedidos en Rappi Lima
            </p>
        </div>

        <!-- Filtros -->
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
            <button class="cat-pill active" onclick="filtrar('todos',this)">Todos</button>
            <button class="cat-pill" onclick="filtrar('entregado',this)">✅ Entregados</button>
            <button class="cat-pill" onclick="filtrar('en_camino',this)">🛵 En camino</button>
            <button class="cat-pill" onclick="filtrar('cancelado',this)">❌ Cancelados</button>
        </div>

        <!-- Lista de pedidos -->
        <div id="pedidos-container"></div>

    </div>

    <div id="toast"></div>

    <script src="../assets/js/auth/session.js"></script>
    <script src="../assets/js/user/compras.js"></script>
    <script>
        Session.requireAuth('usuario');
        const user = Session.current();
        const greet = document.getElementById('user-greeting');
        if (greet) greet.textContent = `Hola, ${user?.nombre} 👋`;
        function logout() { Session.logout(); }
    </script>
</body>

</html>
